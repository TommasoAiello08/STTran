# APT fine-tuning config tuned for Colab.
#
# Dim hyperparameters MUST match the pretrain config because the fine-tuning
# model re-loads the pretrain state dict via ``load_pretrain_backbone``.

stage: finetune

# --- Data
data_path: /content/drive/MyDrive/action_genome/
datasize: large
mode: predcls
use_unlabeled_frames: true
frame_sampling_rate: 3
pin_memory: true
num_workers: 2

# --- Architectural hyperparameters (must match pretrain)
gamma: 4
lambda: 10
obj_feat_dim: 840
rel_feat_dim: 2192
union_proj_dim: 512
box_embed_dim: 128
semantic_dim: 200
n_heads: 8
spatial_enc_layers: 1
short_enc_layers: 3
long_enc_layers: 3
global_enc_layers: 3
dropout: 0.1
use_semantic_branch: true
use_long_term: true

# --- Optimization (paper Sec. 4.1 finetune)
optimizer: sgd
lr: 0.00001
lr_decay: 0.9
momentum: 0.9
batch_size: 8
nepoch: 10
grad_clip: 5.0
amp: true

# --- Pretrain checkpoint to resume from (override on CLI if needed)
pretrain_ckpt: /content/drive/MyDrive/apt_ckpts/pretrain/apt_pretrain_latest.tar

# --- Checkpointing
save_path: /content/drive/MyDrive/apt_ckpts/finetune/
save_every_epoch: true
ckpt_prefix: apt_finetune
